<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/cart.css" />
    <title>PlayBox | Krepšelis</title>
  </head>
  <body>
    <header>
      <div class="wrapper">
        <input type="checkbox" id="menu-toggle" class="menu-toggle" />

        <div class="header-top-bar">
          <label for="menu-toggle" class="menu-button">
            <span></span>
            <span></span>
            <span></span>
          </label>

          <a class="logo" href="/shop/products.html">PlayBox</a>
          <a class="cart-link" href="/shop/cart.html">Krepšelis</a>
        </div>

        <nav class="main-nav">
          <ul>
            <li><a href="/shop/products.html">Pagrindinis</a></li>
            <li><a href="/shop/products.html">Žaislai</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="cart">
        <div class="wrapper">
          <h1>Jūsų krepšelis</h1>

          <div class="cart-layout">
            <div class="cart-items">
              <article class="cart-item">
                <img
                  src="https://iqzaislai.lt/wp-content/uploads/2023/11/T-13-2.jpg.webp"
                  alt="Pop It Pro žaidimų pultelis"
                />

                <div class="cart-item-content">
                  <h2>Pop It Pro</h2>
                  <p class="cart-item-price">7,99 &euro;</p>
                  <p class="cart-item-quantity">Kiekis: 1</p>
                </div>
              </article>
            </div>

            <aside class="cart-summary">
              <h2>Užsakymo suvestinė</h2>

              <div class="summary-row">
                <span>Prekių kiekis</span>
                <span>1</span>
              </div>

              <div class="summary-row summary-total">
                <span>Bendra suma</span>
                <span>7,99 &euro;</span>
              </div>

              <a class="checkout-button" href="#">Apmokėti</a>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="wrapper">
        <p>PlayBox</p>
        <p>El. paštas: info@playbox.lt</p>
        <p>&copy; 2026 PlayBox. Visos teisės saugomos.</p>
      </div>
    </footer>
  </body>
</html>
